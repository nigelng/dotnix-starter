# Opens a PR after `nix flake update`. Requires one of:
#   1. Repo Settings → Actions → General → Workflow permissions →
#      "Allow GitHub Actions to create and approve pull requests", or
#   2. A `WORKFLOW_PAT` repo secret (fine-grained PAT: contents + pull-requests write).
name: Update flake inputs

on:
  schedule:
    # Mondays 08:00 UTC
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: macos-14
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Update lock file
        run: nix flake update

      - name: Verify flake
        run: nix flake check

      - name: Open pull request
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          # PAT bypasses the "Actions may not create PRs" repo setting when set.
          token: ${{ secrets.WORKFLOW_PAT || github.token }}
          commit-message: "chore: update flake inputs"
          title: "chore: update flake inputs"
          body: |
            Automated `nix flake update` from the weekly workflow.

            Review `flake.lock` diff and merge when CI passes.
          branch: automation/flake-update
          delete-branch: true
          labels: dependencies

      - name: Report manual PR link when auto-create is blocked
        if: steps.cpr.outcome == 'failure'
        run: |
          {
            echo "::warning::GitHub Actions could not open a pull request."
            echo "Enable **Allow GitHub Actions to create and approve pull requests** at:"
            echo "https://github.com/${{ github.repository }}/settings/actions"
            echo "Or add a \`WORKFLOW_PAT\` repository secret (contents + pull-requests write)."
            echo "The update branch was still pushed — open a PR manually:"
            echo "https://github.com/${{ github.repository }}/compare/main...automation/flake-update?expand=1"
          } >> "$GITHUB_STEP_SUMMARY"
          exit 1
