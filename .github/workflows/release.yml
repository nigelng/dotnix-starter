# Lands CHANGELOG via PR (main requires PRs via repository rules).
# Needs one of:
#   1. Repo Settings → Actions → General → Workflow permissions →
#      "Allow GitHub Actions to create and approve pull requests", or
#   2. A WORKFLOW_PAT secret (contents + pull-requests write).
name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Semver bump type
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      recover:
        description: Orphan recovery only — use "no" for normal releases
        required: true
        type: choice
        default: "no"
        options:
          - "no"
          - "yes"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Guard — main branch only
        if: github.ref != 'refs/heads/main'
        run: |
          echo "::error::Release workflow must be dispatched from the main branch."
          exit 1

      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.WORKFLOW_PAT || github.token }}
          persist-credentials: true

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install git-cliff
        env:
          GIT_CLIFF_VERSION: v2.7.0
        run: |
          set -euo pipefail
          asset="git-cliff-${GIT_CLIFF_VERSION#v}-x86_64-unknown-linux-gnu.tar.gz"
          base="https://github.com/orhun/git-cliff/releases/download/${GIT_CLIFF_VERSION}"
          curl -fsSL "${base}/${asset}" -o "${asset}"
          curl -fsSL "${base}/${asset}.sha512" -o "${asset}.sha512"
          sha512sum -c "${asset}.sha512"
          tar -xzf "${asset}"
          install -m 0755 "git-cliff-${GIT_CLIFF_VERSION#v}/git-cliff" /usr/local/bin/git-cliff
          git-cliff --version

      - name: Resolve release version
        id: version
        run: |
          set -euo pipefail
          prev="$(./scripts/release-changelog.sh --print-prev-tag)"
          next="$(./scripts/release-changelog.sh --bump "$prev" "${{ inputs.bump }}")"
          {
            echo "prev_tag=$prev"
            echo "next_tag=$next"
          } >> "$GITHUB_OUTPUT"

      - name: Check release state
        id: state
        env:
          RECOVER_INPUT: ${{ inputs.recover }}
        run: |
          set -euo pipefail
          tag="${{ steps.version.outputs.next_tag }}"

          recover=false
          case "${RECOVER_INPUT,,}" in
            yes | true | 1) recover=true ;;
            no | false | 0 | "") recover=false ;;
            *)
              echo "::error::Invalid recover input: ${RECOVER_INPUT} (use no or yes)"
              exit 1
              ;;
          esac
          echo "recover=${recover}" >> "$GITHUB_OUTPUT"
          echo "Release ${tag} (recover=${recover})" >> "$GITHUB_STEP_SUMMARY"

          ./scripts/release-changelog.sh --check-orphans "$tag" "$recover"

          header=false
          if ./scripts/release-changelog.sh --header-exists "$tag"; then
            header=true
          fi

          tag_exists=false
          if ./scripts/release-changelog.sh --tag-exists "$tag"; then
            tag_exists=true
          fi

          if [[ "$header" == true && "$tag_exists" == true ]]; then
            echo "::error::Release ${tag} is already published (changelog header and tag exist)."
            exit 1
          fi

          if [[ "$tag_exists" == true && "$header" == false ]]; then
            echo "::error::Tag ${tag} exists without a matching changelog header."
            exit 1
          fi

          if [[ "$header" == true && "$tag_exists" == false && "$recover" != true ]]; then
            echo "::error::Partial release detected for ${tag}. Re-dispatch with recover: yes."
            exit 1
          fi

          if [[ "$recover" == true && "$header" == false ]]; then
            echo "::error::recover: yes requires an existing changelog header for ${tag}."
            echo "::error::For a normal new release, set recover to no."
            exit 1
          fi

          orphan=false
          if [[ "$header" == true && "$tag_exists" == false && "$recover" == true ]]; then
            orphan=true
          fi
          echo "orphan=$orphan" >> "$GITHUB_OUTPUT"

      - name: Update CHANGELOG
        if: steps.state.outputs.orphan != 'true'
        run: |
          set -euo pipefail
          prev="${{ steps.version.outputs.prev_tag }}"
          tag="${{ steps.version.outputs.next_tag }}"
          ./scripts/release-changelog.sh --since "$prev" --version "$tag" --prepend > release-body.md

      - name: Open and merge release PR
        if: steps.state.outputs.orphan != 'true'
        id: push
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_PAT || github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.next_tag }}
          PREV_TAG: ${{ steps.version.outputs.prev_tag }}
        run: |
          set -euo pipefail
          tag="$RELEASE_TAG"
          branch="automation/release-${tag}"

          if git diff --quiet CHANGELOG.md; then
            echo "::error::CHANGELOG.md unchanged after generation."
            exit 1
          fi

          # Drop any stray local branch from a prior failed run
          git branch -D "$branch" 2>/dev/null || true
          git checkout -b "$branch"
          git add CHANGELOG.md
          git commit -m "docs(release): ${tag} [skip ci]"
          git push -u origin "$branch" --force

          title="docs(release): ${tag}"
          body="Automated release changelog for \`${tag}\`.

Generated by the Release workflow. Merging is required because \`main\` forbids direct pushes.

Changelog-only PR — flake CI is skipped via \`paths-ignore\`."

          pr_url="$(gh pr create --base main --head "$branch" --title "$title" --body "$body")"
          echo "Opened ${pr_url}" >> "$GITHUB_STEP_SUMMARY"
          pr_number="${pr_url##*/}"

          # Ruleset requires PRs; approvals required = 0. Squash-merge without waiting for flake CI
          # (release PRs are CHANGELOG-only and flake.yml paths-ignores that on PRs).
          if ! gh pr merge "$pr_number" --squash --delete-branch \
            --subject "docs(release): ${tag} [skip ci]" \
            --body ""; then
            echo "::error::Could not merge release PR ${pr_url}."
            echo "Ensure Actions can create/merge PRs, or set WORKFLOW_PAT (contents + pull-requests write)."
            exit 1
          fi

          commit_sha="$(gh pr view "$pr_number" --json mergeCommit -q .mergeCommit.oid)"
          if [[ -z "$commit_sha" || "$commit_sha" == "null" ]]; then
            git fetch origin main
            commit_sha="$(git rev-parse origin/main)"
          fi

          git checkout main
          git pull --ff-only origin main

          # Refresh release body from merged CHANGELOG (section is stable after merge)
          ./scripts/release-changelog.sh --extract-section "$tag" > release-body.md
          if [[ ! -s release-body.md ]]; then
            echo "::error::Could not extract changelog section for ${tag} after merge."
            exit 1
          fi

          echo "commit_sha=${commit_sha}" >> "$GITHUB_OUTPUT"
          echo "Merged ${title} → ${commit_sha}" >> "$GITHUB_STEP_SUMMARY"

      - name: Resolve orphan release
        if: steps.state.outputs.orphan == 'true'
        id: recover
        run: |
          set -euo pipefail
          tag="${{ steps.version.outputs.next_tag }}"
          ./scripts/release-changelog.sh --extract-section "$tag" > release-body.md
          if [[ ! -s release-body.md ]]; then
            echo "::error::Could not extract changelog section for ${tag}."
            exit 1
          fi
          commit_sha="$(./scripts/release-changelog.sh --release-commit-sha "$tag")"
          echo "commit_sha=$commit_sha" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.next_tag }}
          target_commitish: ${{ steps.state.outputs.orphan == 'true' && steps.recover.outputs.commit_sha || steps.push.outputs.commit_sha }}
          body_path: release-body.md
          draft: false
          token: ${{ secrets.WORKFLOW_PAT || github.token }}
