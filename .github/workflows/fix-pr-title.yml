name: Semantic PR title

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read
  pull-requests: read
  issues: write

concurrency:
  group: semantic-pr-title-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  check-title:
    runs-on: ubuntu-latest
    steps:
      - name: Require conventional commit PR title
        uses: actions/github-script@v7
        with:
          script: |
            const types =
              "build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test";
            const conventionalTitle = new RegExp(
              "^(" + types + ")(\\([a-z0-9\\-_/]+\\))?!?: [a-z].+$"
            );

            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;
            const title = pr.title;

            if (conventionalTitle.test(title)) {
              core.info("PR title valid: " + title);
              return;
            }

            const marker = "<!-- semantic-pr-title -->";
            const docUrl =
              "https://github.com/" + owner + "/" + repo +
              "/blob/main/.cursor/rules/semantic-commits.mdc";

            const body = [
              marker,
              "## Invalid PR title",
              "",
              "This repository requires [Conventional Commits](https://www.conventionalcommits.org/) PR titles:",
              "",
              "```",
              "<type>[optional scope][optional !]: <description>",
              "```",
              "",
              "**Allowed types:** `feat`, `fix`, `docs`, `style`, `refactor`, `perf`, `test`, `build`, `ci`, `chore`, `revert`",
              "",
              "**Rules:** description starts with a lowercase letter, imperative mood, no trailing period.",
              "",
              "See also: [semantic-commits rule](" + docUrl + ")",
              "",
              "Current title: `" + title + "`",
            ].join("\n");

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: pr.number,
            });

            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pr.number,
                body,
              });
            }

            core.setFailed('Invalid PR title: "' + title + '"');
